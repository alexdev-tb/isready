# Default structure isready.toml files should follow. This file contains all supported checks.

[project]
name = "isready"

[[check]]
name = "Postgres"
type = "tcp"
host = "localhost"
port = 22

[[check]]
name = "Home"
type = "env"
var = "HOME"

[[check]]
name = "Check if the binary 'ls' exists"
type = "binary"
executable = "ls"